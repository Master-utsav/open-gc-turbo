name: Continuous Deployment for HTTP Express

on:
  push:
    branches:
      - main

concurrency:
  group: http-express-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build Docker Image, Push and Deploy HTTP Express
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: masterutsav/open-gc-turbo-http-express
      CONTAINER_NAME: open-gc-turbo-http-express-container
      NETWORK_NAME: open-gc-network

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.http-express
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SECRET_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 22
          script: |
            export PATH=$PATH:/usr/bin

            IMAGE_NAME="masterutsav/open-gc-turbo-http-express"
            CONTAINER_NAME="open-gc-turbo-http-express-container"
            NETWORK_NAME="open-gc-network"

            set -e

            # Login to DockerHub before pulling private image
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            # Create network if it doesn't exist
            docker network inspect $NETWORK_NAME > /dev/null 2>&1 || \
              docker network create $NETWORK_NAME

            docker pull $IMAGE_NAME:${{ github.sha }}

            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true

            docker run -d \
              --name $CONTAINER_NAME \
              --network $NETWORK_NAME \
              --restart unless-stopped \
              --env-file /home/ubuntu/envs/http-express.env \
              -p 8080:8080 \
              $IMAGE_NAME:${{ github.sha }}

            docker image prune -af